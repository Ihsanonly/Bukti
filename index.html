<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bukti Pengiriman Sambel Bawang</title>
    <style>
        /* Mengatur agar gambar responsif dan rapi */
        .gambar-responsif {
            max-width: 100%; /* Gambar tidak akan melebihi lebar layar */
            height: auto;    /* Proporsi gambar tetap terjaga (tidak gepeng) */
            display: block;
            margin: 20px auto; /* Membuat posisi gambar berada di tengah */
            border-radius: 8px; /* Opsi tambahan: membuat sudut gambar sedikit membulat */
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); /* Opsi tambahan: memberi efek bayangan */
        }
        
        /* Mengatur sedikit ruang (padding) pada tampilan keseluruhan */
        body {
            padding: 15px;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Bukti Pengiriman</h2>

    <img src="WhatsApp Image Sambel Bawang.jpeg" alt="Bukti Pengiriman SPX" class="gambar-responsif">

</body>
</html>
